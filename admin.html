<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OtaHub Admin</title>
<meta name="robots" content="noindex, nofollow"/>
<style>
:root {
  --bg: #0b0418; --surf: #150a2c; --surf2: #1d1040; --card: #190c36;
  --cyan: #00e5ff; --sakura: #ff3080; --violet: #7c3aed; --lav: #a78bfa;
  --amber: #fbbf24; --green: #34d399; --white: #f0eeff;
  --dim: rgba(240,238,255,.72); --muted: rgba(240,238,255,.38);
  --border: rgba(255,255,255,.09); --bcyan: rgba(0,229,255,.15);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }

/* ── Layout ── */
.layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
.sidebar { background: var(--surf); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.main { overflow-y: auto; }

/* ── Sidebar ── */
.logo { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.logo-text { font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
.logo-text span { color: var(--cyan); }
.logo-badge { font-size: 10px; background: var(--violet); color: #fff; padding: 2px 7px; border-radius: 20px; font-weight: 600; letter-spacing: .05em; }

.sidebar-section { padding: 12px 12px 4px; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-radius: 8px; margin: 2px 8px; cursor: pointer; color: var(--dim); transition: all .15s; font-size: 13.5px; border: none; background: none; width: calc(100% - 16px); text-align: left; }
.nav-item:hover { background: var(--surf2); color: var(--white); }
.nav-item.active { background: var(--bcyan); color: var(--cyan); }
.nav-item .icon { width: 16px; text-align: center; flex-shrink: 0; opacity: .8; }
.nav-item .badge { margin-left: auto; background: var(--violet); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; }

.sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); }
.connected-info { font-size: 11px; color: var(--muted); line-height: 1.7; }
.connected-info strong { color: var(--dim); }
.disconnect-btn { margin-top: 8px; padding: 5px 10px; background: rgba(255,48,128,.12); border: 1px solid rgba(255,48,128,.3); color: var(--sakura); border-radius: 6px; cursor: pointer; font-size: 11px; width: 100%; }
.disconnect-btn:hover { background: rgba(255,48,128,.22); }

/* ── Header ── */
.page-header { padding: 24px 32px 0; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.page-title { font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
.page-title small { font-size: 12px; color: var(--muted); font-weight: 400; display: block; margin-top: 2px; }
.header-actions { display: flex; gap: 10px; align-items: center; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; text-decoration: none; }
.btn-primary { background: var(--cyan); color: #000; }
.btn-primary:hover { background: #00ccee; }
.btn-secondary { background: var(--surf2); color: var(--white); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--cyan); color: var(--cyan); }
.btn-danger { background: rgba(255,48,128,.15); color: var(--sakura); border: 1px solid rgba(255,48,128,.3); }
.btn-danger:hover { background: rgba(255,48,128,.25); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-icon { padding: 7px; border-radius: 7px; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── Setup screen ── */
#setup-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.setup-card { background: var(--surf); border: 1px solid var(--border); border-radius: 16px; padding: 40px; max-width: 460px; width: 100%; }
.setup-card h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
.setup-card .sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; line-height: 1.7; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--dim); margin-bottom: 6px; letter-spacing: .03em; }
.field input, .field select { width: 100%; background: var(--surf2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--white); font-size: 13px; outline: none; transition: border .15s; }
.field input:focus, .field select:focus { border-color: var(--cyan); }
.field .hint { font-size: 11px; color: var(--muted); margin-top: 5px; line-height: 1.6; }
.field .hint a { color: var(--cyan); }
.setup-submit { width: 100%; margin-top: 8px; padding: 11px; font-size: 14px; }
.setup-error { background: rgba(255,48,128,.1); border: 1px solid rgba(255,48,128,.3); border-radius: 8px; padding: 10px 14px; color: var(--sakura); font-size: 12px; margin-top: 12px; display: none; }

/* ── Article list ── */
.content-area { padding: 24px 32px 48px; }
.search-row { display: flex; gap: 10px; margin-bottom: 20px; }
.search-input { flex: 1; background: var(--surf); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; color: var(--white); font-size: 13px; outline: none; }
.search-input:focus { border-color: var(--cyan); }
.filter-select { background: var(--surf); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--white); font-size: 13px; outline: none; }

.articles-grid { display: grid; gap: 10px; }
.article-card { background: var(--surf); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: grid; grid-template-columns: 60px 1fr auto; gap: 14px; align-items: center; transition: border .15s; cursor: pointer; }
.article-card:hover { border-color: rgba(0,229,255,.35); }
.art-thumb { width: 60px; height: 40px; object-fit: cover; border-radius: 6px; background: var(--surf2); }
.art-info { min-width: 0; }
.art-title { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--white); }
.art-meta { font-size: 11px; color: var(--muted); margin-top: 3px; display: flex; gap: 10px; }
.art-cat { background: var(--bcyan); color: var(--cyan); padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.art-actions { display: flex; gap: 6px; }

/* ── Editor ── */
.editor-layout { display: grid; grid-template-columns: 1fr 300px; gap: 24px; padding: 24px 32px 48px; }
.editor-main {}
.editor-sidebar {}

.field-group { background: var(--surf); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.field-group-title { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.form-input { width: 100%; background: var(--surf2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--white); font-size: 13px; outline: none; transition: border .15s; font-family: inherit; }
.form-input:focus { border-color: var(--cyan); }
textarea.form-input { resize: vertical; min-height: 80px; line-height: 1.6; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: var(--dim); margin-bottom: 5px; letter-spacing: .03em; margin-top: 12px; }
.form-label:first-child { margin-top: 0; }
.img-preview { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-top: 8px; background: var(--surf2); display: block; }
.img-preview-placeholder { width: 100%; height: 120px; border-radius: 8px; margin-top: 8px; background: var(--surf2); border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; }

/* Body editor */
.body-editor { background: var(--surf2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.body-toolbar { display: flex; gap: 4px; padding: 8px 10px; border-bottom: 1px solid var(--border); flex-wrap: wrap; background: var(--surf); }
.tb-btn { padding: 4px 9px; background: transparent; border: 1px solid var(--border); border-radius: 5px; color: var(--dim); font-size: 12px; cursor: pointer; transition: all .12s; font-family: inherit; }
.tb-btn:hover { background: var(--surf2); color: var(--white); border-color: rgba(255,255,255,.15); }
.tb-sep { width: 1px; background: var(--border); margin: 2px 4px; }
#body-textarea { width: 100%; min-height: 400px; background: transparent; border: none; padding: 14px; color: var(--dim); font-size: 13px; line-height: 1.8; resize: vertical; outline: none; font-family: 'Consolas', 'Monaco', monospace; }

/* Sidebar widgets */
.status-indicator { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 10px 0; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse 2s infinite; }
.status-dot.saving { background: var(--amber); animation: none; }
.status-dot.error { background: var(--sakura); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.save-log { font-size: 11px; color: var(--muted); line-height: 1.7; max-height: 120px; overflow-y: auto; }

.deploy-info { background: rgba(0,229,255,.05); border: 1px solid var(--bcyan); border-radius: 8px; padding: 12px; font-size: 11px; color: var(--dim); line-height: 1.8; }
.deploy-info strong { color: var(--cyan); }

/* ── Loading ── */
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; flex-direction: column; gap: 16px; color: var(--muted); }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--cyan); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
#toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast-item { background: var(--surf); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; font-size: 13px; min-width: 260px; display: flex; align-items: center; gap: 10px; animation: toastIn .2s ease; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
.toast-item.success { border-color: rgba(52,211,153,.4); }
.toast-item.error { border-color: rgba(255,48,128,.4); }
.toast-icon { font-size: 16px; flex-shrink: 0; }
@keyframes toastIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: .5; }

/* ── Rankings editor ── */
.rank-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap; }
.rank-tab { padding: 9px 18px; border: none; background: none; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 600; border-bottom: 2px solid transparent; transition: all .15s; }
.rank-tab:hover { color: var(--white); }
.rank-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
.rank-entry { display: grid; grid-template-columns: 72px 1fr; gap: 12px; align-items: start; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; background: var(--surf); transition: border .15s; }
.rank-entry:hover { border-color: rgba(0,229,255,.2); }
.rank-entry.top3 { border-color: rgba(0,229,255,.3); background: rgba(0,229,255,.03); }
.rank-num { font-size: 20px; font-weight: 800; color: var(--cyan); text-align: center; padding-top: 6px; }
.rank-num.gold { color: #fbbf24; }
.rank-num.silver { color: #a0aec0; }
.rank-num.bronze { color: #cd7f32; }
.rank-img-prev { width: 72px; height: 54px; object-fit: cover; border-radius: 6px; background: var(--surf2); display: block; margin-top: 6px; }
.rank-fields { display: grid; gap: 6px; }
.rank-row { display: grid; grid-template-columns: 1fr 90px 90px; gap: 8px; }
.rank-input-sm { background: var(--surf2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; color: var(--white); font-size: 12px; outline: none; width: 100%; }
.rank-input-sm:focus { border-color: var(--cyan); }

/* ── Pages grid ── */
.pages-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 10px; }
.page-card { background: var(--surf); border: 1px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; transition: border .15s; }
.page-card:hover { border-color: rgba(0,229,255,.35); }
.page-card .pc-icon { font-size: 24px; margin-bottom: 8px; }
.page-card .pc-name { font-size: 13px; font-weight: 600; color: var(--white); margin-bottom: 4px; }
.page-card .pc-file { font-size: 10px; color: var(--muted); }
.page-card .pc-actions { display: flex; gap: 6px; margin-top: 10px; }

/* ── Responsive ── */
@media(max-width:768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .editor-layout { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ── SETUP SCREEN ── -->
<div id="setup-screen">
  <div class="setup-card">
    <h1>🎮 OtaHub Admin</h1>
    <p class="sub">Kết nối GitHub repo để chỉnh sửa bài viết trực tiếp trên browser. Mọi thay đổi sẽ tự deploy lên Cloudflare Pages.</p>

    <div class="field">
      <label>GitHub Personal Access Token</label>
      <input type="password" id="setup-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"/>
      <div class="hint">Tạo tại <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens</a> — chọn scope <strong>repo</strong></div>
    </div>
    <div class="field">
      <label>GitHub Username</label>
      <input type="text" id="setup-owner" placeholder="username"/>
    </div>
    <div class="field">
      <label>Tên Repository</label>
      <input type="text" id="setup-repo" placeholder="otahub-" value="otahub-"/>
    </div>
    <div class="field">
      <label>Branch</label>
      <input type="text" id="setup-branch" placeholder="main" value="main"/>
    </div>
    <button class="btn btn-primary setup-submit" onclick="doSetup()">Kết nối →</button>
    <div id="setup-error" class="setup-error"></div>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app" style="display:none">
  <div class="layout">

    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="logo">
        <div class="logo-text">Ota<span>Hub</span></div>
        <span class="logo-badge">ADMIN</span>
      </div>

      <div class="sidebar-section">Nội dung</div>
      <button class="nav-item active" id="nav-articles" onclick="showView('articles')">
        <span class="icon">📄</span> Bài viết
        <span class="badge" id="article-count">—</span>
      </button>
      <button class="nav-item" id="nav-new" onclick="newArticle()">
        <span class="icon">✏️</span> Viết bài mới
      </button>

      <div class="sidebar-section">Chỉnh sửa đặc biệt</div>
      <button class="nav-item" id="nav-rankings" onclick="showView('rankings')">
        <span class="icon">📊</span> Bảng xếp hạng
      </button>
      <button class="nav-item" id="nav-pages" onclick="showView('pages')">
        <span class="icon">🗂️</span> Tất cả trang
      </button>

      <div class="sidebar-section">Website</div>
      <button class="nav-item" onclick="openSite()">
        <span class="icon">🌐</span> Xem website
      </button>
      <button class="nav-item" onclick="openGitHub()">
        <span class="icon">⚙️</span> GitHub repo
      </button>

      <div class="sidebar-footer">
        <div class="connected-info" id="conn-info"></div>
        <button class="disconnect-btn" onclick="disconnect()">Đăng xuất</button>
      </div>
    </nav>

    <!-- Main content -->
    <main class="main" id="main-content">
      <div class="loading"><div class="spinner"></div><span>Đang tải...</span></div>
    </main>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let CFG = {};
let ARTICLES = [];
let currentFile = null;
let currentSha = null;

// ── Setup ──────────────────────────────────────────────────────────────────
window.onload = () => {
  const saved = localStorage.getItem('otahub_cfg');
  if (saved) {
    CFG = JSON.parse(saved);
    startApp();
  }
};

async function doSetup() {
  const token  = document.getElementById('setup-token').value.trim();
  const owner  = document.getElementById('setup-owner').value.trim();
  const repo   = document.getElementById('setup-repo').value.trim();
  const branch = document.getElementById('setup-branch').value.trim() || 'main';
  const errEl  = document.getElementById('setup-error');
  errEl.style.display = 'none';

  if (!token || !owner || !repo) {
    errEl.textContent = 'Vui lòng điền đầy đủ thông tin.';
    errEl.style.display = 'block';
    return;
  }

  // Test connection
  const btn = document.querySelector('.setup-submit');
  btn.textContent = 'Đang kết nối...'; btn.disabled = true;
  try {
    const r = await ghFetch(`/repos/${owner}/${repo}`, token);
    if (!r.ok) throw new Error('Không tìm thấy repo hoặc token không hợp lệ.');
    CFG = { token, owner, repo, branch };
    localStorage.setItem('otahub_cfg', JSON.stringify(CFG));
    startApp();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
    btn.textContent = 'Kết nối →'; btn.disabled = false;
  }
}

function startApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('conn-info').innerHTML =
    `<strong>${CFG.owner}/${CFG.repo}</strong><br>Branch: ${CFG.branch}`;
  loadArticles();
}

function disconnect() {
  if (!confirm('Đăng xuất khỏi admin?')) return;
  localStorage.removeItem('otahub_cfg');
  location.reload();
}

// ── GitHub API ─────────────────────────────────────────────────────────────
function ghFetch(path, token, opts={}) {
  return fetch('https://api.github.com' + path, {
    ...opts,
    headers: {
      'Authorization': 'Bearer ' + (token || CFG.token),
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      ...(opts.headers || {})
    }
  });
}

async function ghGet(path) {
  const r = await ghFetch(`/repos/${CFG.owner}/${CFG.repo}/contents/${path}?ref=${CFG.branch}`);
  if (!r.ok) throw new Error('GitHub API error: ' + r.status);
  return r.json();
}

async function ghPut(path, content, sha, message) {
  const r = await ghFetch(`/repos/${CFG.owner}/${CFG.repo}/contents/${path}`, {}, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      message,
      content: btoa(unescape(encodeURIComponent(content))),
      sha,
      branch: CFG.branch
    })
  });
  if (!r.ok) {
    const e = await r.json();
    throw new Error(e.message || 'Lỗi khi lưu file');
  }
  return r.json();
}

// ── Load articles ──────────────────────────────────────────────────────────
const ARTICLE_FILES = [
  'gta6-preview.html','elden-ring-dlc2.html','chainsaw-man-season3.html',
  'dragon-ball-daima.html','solo-leveling-season2.html','one-piece-egghead-arc.html',
  'jujutsu-kaisen-ket-thuc.html','berserk-arc-cuoi.html','stellar-blade-dlc.html',
  'honkai-star-rail-30.html','nintendo-switch-2-review.html','genshin-natlan-review.html',
  'black-myth-wukong-huong-dan.html','wuthering-waves-24.html','space-marine-2-dlc.html',
  'top-game-pc-2026.html','top-anime-2025.html','anime-mua-he-2026.html',
  'blue-protocol-review.html','xbox-showcase-2026.html',
  'tekken8-season2.html','kingdom-come-deliverance-2.html',
  'frieren-season2.html','resident-evil-9-announcement.html'
];

async function loadArticles() {
  setMain(`<div class="loading"><div class="spinner"></div><span>Đang tải danh sách bài viết...</span></div>`);
  try {
    // Fetch all article files in parallel (get metadata only)
    const results = await Promise.allSettled(
      ARTICLE_FILES.map(f => ghGet(f))
    );
    ARTICLES = [];
    results.forEach((r, i) => {
      if (r.status === 'fulfilled') {
        const data = r.value;
        const html = decodeURIComponent(escape(atob(data.content)));
        ARTICLES.push({
          file: ARTICLE_FILES[i],
          sha: data.sha,
          title: extract(html, /<title>([^<]+)<\/title>/) || ARTICLE_FILES[i],
          desc: extract(html, /name="description" content="([^"]+)"/) || '',
          hero: extractHero(html),
          cat: extract(html, /article:section" content="([^"]+)"/) || 'Gaming',
          date: extract(html, /datePublished": "([^"]+)"/) || '',
        });
      }
    });
    document.getElementById('article-count').textContent = ARTICLES.length;
    showView('articles');
  } catch(e) {
    setMain(`<div class="empty-state"><div class="empty-icon">⚠️</div><p>Lỗi tải bài viết: ${e.message}</p></div>`);
  }
}

function extract(html, re) {
  const m = html.match(re);
  return m ? m[1].replace(' · OtaHub','').trim() : null;
}

function extractHero(html) {
  const m = html.match(/class="art-hero-img"\s+style="([^"]+)"/);
  if (m) {
    const u = m[1].match(/url\(([^)]+)\)/);
    return u ? u[1] : '';
  }
  const f = html.match(/<figure><img src="([^"]+)"/);
  return f ? f[1] : '';
}

function extractHeroPos(html) {
  const m = html.match(/class="art-hero-img"\s+style="([^"]+)"/);
  if (!m) return 50;
  const p = m[1].match(/background-position[^:]*:\s*center\s+(\d+)%/);
  return p ? parseInt(p[1]) : 50;
}

// ── Views ──────────────────────────────────────────────────────────────────
function setMain(html) { document.getElementById('main-content').innerHTML = html; }

function showView(view) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const navMap = { articles: 'nav-articles', rankings: 'nav-rankings', pages: 'nav-pages' };
  document.getElementById(navMap[view] || 'nav-articles')?.classList.add('active');

  if (view === 'articles') renderArticleList();
  else if (view === 'rankings') loadRankings();
  else if (view === 'pages') renderPagesView();
}

function renderArticleList(filter='', cat='') {
  const filtered = ARTICLES.filter(a => {
    const q = filter.toLowerCase();
    const matchQ = !q || a.title.toLowerCase().includes(q) || a.file.includes(q);
    const matchCat = !cat || a.cat === cat;
    return matchQ && matchCat;
  });

  const cats = [...new Set(ARTICLES.map(a => a.cat))].sort();
  const catOpts = `<option value="">Tất cả danh mục</option>` +
    cats.map(c => `<option value="${c}" ${c===cat?'selected':''}>${c}</option>`).join('');

  const cards = filtered.length ? filtered.map(a => `
    <div class="article-card" onclick="editArticle('${a.file}')">
      <img class="art-thumb" src="${a.hero}" alt="${a.title}" onerror="this.style.background='var(--surf2)';this.src=''"/>
      <div class="art-info">
        <div class="art-title">${a.title}</div>
        <div class="art-meta">
          <span class="art-cat">${a.cat}</span>
          <span>${a.file}</span>
          <span>${a.date ? a.date.slice(0,10) : ''}</span>
        </div>
      </div>
      <div class="art-actions">
        <a class="btn btn-secondary btn-sm btn-icon" href="https://otahub.asia/${a.file}" target="_blank" onclick="event.stopPropagation()" title="Xem bài">🔗</a>
        <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();editArticle('${a.file}')">Chỉnh sửa</button>
      </div>
    </div>
  `).join('') : `<div class="empty-state"><div class="empty-icon">🔍</div><p>Không tìm thấy bài viết nào.</p></div>`;

  setMain(`
    <div class="page-header">
      <div class="page-title">Bài viết <small>${filtered.length}/${ARTICLES.length} bài</small></div>
      <div class="header-actions">
        <button class="btn btn-secondary btn-sm" onclick="loadArticles()">🔄 Tải lại</button>
        <button class="btn btn-primary" onclick="newArticle()">✏️ Viết mới</button>
      </div>

      <div class="search-row">
        <input class="search-input" placeholder="Tìm bài viết..." oninput="renderArticleList(this.value, document.getElementById('cat-filter').value)" />
        <select class="filter-select" id="cat-filter" onchange="renderArticleList(document.querySelector('.search-input').value, this.value)">
          ${catOpts}
        </select>
      </div>
      <div class="articles-grid">${cards}</div>
    </div>
  `);
}

// ── Editor ─────────────────────────────────────────────────────────────────
async function editArticle(file) {
  setMain(`<div class="loading"><div class="spinner"></div><span>Đang tải bài viết...</span></div>`);
  try {
    const data = await ghGet(file);
    const html = decodeURIComponent(escape(atob(data.content)));
    currentFile = file;
    currentSha = data.sha;
    renderEditor(file, html);
  } catch(e) {
    toast('error', 'Không tải được bài: ' + e.message);
    showView('articles');
  }
}

function extractBody(html, cls) {
  const re = new RegExp(`<article class="art-body ${cls.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}">([\\s\\S]*?)<\\/article>`);
  const m = html.match(re);
  return m ? m[1].trim() : '';
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function unesc(s) { return s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"'); }

function markChanged() {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  if (dot) dot.className = 'status-dot saving';
  if (txt) txt.textContent = 'Có thay đổi chưa lưu';
}

function updateHeroPreview(url) {
  const img = document.getElementById('hero-preview');
  const ph  = document.getElementById('hero-placeholder');
  if (!img || !ph) return;
  if (url) {
    img.src = url;
    img.style.display = 'block';
    ph.style.display  = 'none';
  } else {
    img.style.display = 'none';
    ph.style.display  = 'flex';
  }
  markChanged();
}

function updateHeroPosLabel(val) {
  const lbl = document.getElementById('hero-pos-label');
  if (lbl) lbl.textContent = val + '%';
  const img = document.getElementById('hero-preview');
  if (img) img.style.objectPosition = `center ${val}%`;
  markChanged();
}

function renderBodyImgs(bodyHtml) {
  const el = document.getElementById('body-imgs-list');
  if (!el) return;
  const imgs = [...bodyHtml.matchAll(/<img[^>]+src="([^"]+)"/g)].map(m => m[1]);
  if (!imgs.length) {
    el.innerHTML = '<p style="color:var(--muted);font-size:12px">Không có ảnh trong bài. Dùng nút 📷 Ảnh trong toolbar bên dưới để thêm.</p>';
    return;
  }
  el.innerHTML = imgs.map((src, i) => `
    <div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)">
      <label class="form-label">Ảnh ${i+1}</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input class="form-input" style="flex:1;font-size:12px" id="body-img-${i}"
          value="${esc(src)}" placeholder="URL ảnh..."
          oninput="syncBodyImg(${i},this.value)"/>
        <button class="tb-btn" onclick="applyBodyImg(${i})">✓ Áp dụng</button>
      </div>
      <img src="${src}" id="body-img-prev-${i}"
        style="width:100%;height:90px;object-fit:cover;border-radius:6px;margin-top:6px;background:var(--surf2)"
        onerror="this.style.opacity=0.3"/>
    </div>
  `).join('');
}

function syncBodyImg(idx, newUrl) {
  const prev = document.getElementById(`body-img-prev-${idx}`);
  if (prev) { prev.src = newUrl; prev.style.opacity = 1; }
}

function applyBodyImg(idx) {
  const ta = document.getElementById('body-textarea');
  const inp = document.getElementById(`body-img-${idx}`);
  if (!ta || !inp) return;
  const newUrl = inp.value.trim();
  const imgs = [...ta.value.matchAll(/<img[^>]+src="([^"]+)"/g)];
  if (idx >= imgs.length) return;
  const oldSrc = imgs[idx][1];
  ta.value = ta.value.replace(new RegExp(oldSrc.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'g'), newUrl);
  syncBodyImg(idx, newUrl);
  toast('success', `Đã thay ảnh ${idx+1}`);
  markChanged();
}

// ── Toolbar helpers ────────────────────────────────────────────────────────
function wrapSel(open, close) {
  const ta = document.getElementById('body-textarea');
  if (!ta) return;
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.slice(s, e);
  const decoded = unesc(open) + sel + unesc(close);
  ta.value = ta.value.slice(0, s) + decoded + ta.value.slice(e);
  markChanged();
}

function insertImg() {
  const url = prompt('URL ảnh:');
  if (!url) return;
  const alt = prompt('Alt text (mô tả ảnh):') || '';
  const cap = prompt('Caption (chú thích):') || '';
  const html = `\n<figure><img src="${url}" alt="${alt}" loading="lazy"/>${cap?`<figcaption>${cap}</figcaption>`:''}</figure>\n`;
  insertAt(html);
}

function insertPara() { insertAt('\n<p></p>\n'); }
function insertBlock() { insertAt('\n<blockquote>\n\n<cite></cite>\n</blockquote>\n'); }

function insertAt(text) {
  const ta = document.getElementById('body-textarea');
  if (!ta) return;
  const pos = ta.selectionStart;
  ta.value = ta.value.slice(0, pos) + text + ta.value.slice(pos);
  ta.selectionStart = ta.selectionEnd = pos + text.length;
  ta.focus();
  markChanged();
}

// ── Save ───────────────────────────────────────────────────────────────────
async function saveArticle() {
  const title   = document.getElementById('ed-title')?.value || '';
  const desc    = document.getElementById('ed-desc')?.value || '';
  const hero    = document.getElementById('ed-hero')?.value || '';
  const heroPos = document.getElementById('ed-hero-pos')?.value || '50';
  const cat     = document.getElementById('ed-cat')?.value || 'Gaming';
  const bodyVi  = document.getElementById('body-textarea')?.value || '';

  if (!currentFile || !currentSha) return;

  const btn = document.getElementById('save-btn');
  btn.textContent = '⏳ Đang lưu...'; btn.disabled = true;

  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  if (dot) dot.className = 'status-dot saving';
  if (txt) txt.textContent = 'Đang commit lên GitHub...';

  try {
    // Get current file content
    const data = await ghGet(currentFile);
    let html = decodeURIComponent(escape(atob(data.content)));
    const sha = data.sha;

    // Apply edits
    html = html.replace(/<title>[^<]+<\/title>/, `<title>${title} · OtaHub</title>`);
    html = html.replace(/(<meta name="description" content=")[^"]*(")/,   `$1${desc}$2`);
    html = html.replace(/(<meta property="og:title" content=")[^"]*(")/,  `$1${title} · OtaHub$2`);
    html = html.replace(/(<meta property="og:description" content=")[^"]*(")/,  `$1${desc}$2`);
    html = html.replace(/(<meta name="twitter:title" content=")[^"]*(")/,  `$1${title} · OtaHub$2`);
    html = html.replace(/(<meta name="twitter:description" content=")[^"]*(")/,  `$1${desc}$2`);
    html = html.replace(/("headline": ")[^"]*(")/,  `$1${title}$2`);
    html = html.replace(/(<meta property="article:section" content=")[^"]*(")/,  `$1${cat}$2`);
    // Hero
    html = html.replace(/(class="art-hero-img"\s+style=")[^"]*(")/,
      `$1background-image:url(${hero});background-position:center ${heroPos}%;background-color:#0b0418;$2`);
    // H1
    html = html.replace(/(<h1 class="art-hero-title lang-vi active">)[^<]*(<\/h1>)/, `$1${title}$2`);
    // Body
    const newBody = `<article class="art-body lang-vi active">\n${bodyVi}\n</article>`;
    html = html.replace(/<article class="art-body lang-vi active">[\s\S]*?<\/article>/, newBody);

    await ghPut(currentFile, html, sha, `[admin] cap nhat: ${title.slice(0,50)}`);

    // Update local state
    currentSha = sha;
    const art = ARTICLES.find(a => a.file === currentFile);
    if (art) { art.title = title; art.desc = desc; art.hero = hero; art.cat = cat; }

    if (dot) dot.className = 'status-dot';
    if (txt) txt.textContent = 'Đã lưu • ' + new Date().toLocaleTimeString('vi-VN');
    const log = document.getElementById('save-log');
    if (log) log.innerHTML = `✅ Commit lúc ${new Date().toLocaleTimeString('vi-VN')}<br>` + log.innerHTML;

    toast('success', '✅ Đã lưu và deploy! Chờ ~1-2 phút để live.');
  } catch(e) {
    if (dot) dot.className = 'status-dot error';
    if (txt) txt.textContent = 'Lỗi: ' + e.message;
    toast('error', 'Lỗi lưu: ' + e.message);
  } finally {
    btn.textContent = '💾 Lưu & Deploy'; btn.disabled = false;
  }
}

  if (!slug) return;
  const filename = slug.replace(/[^a-z0-9-]/gi,'').toLowerCase() + '.html';

  // Use minimal template
  const template = `<!DOCTYPE html>
<html lang="vi">
<head>
<title>Tiêu đề bài viết · OtaHub</title>
<meta charset="UTF-8"/>
<meta name="description" content="Mô tả bài viết"/>

<meta property="og:description" content="Mô tả bài viết"/>

// ── Rankings Editor ────────────────────────────────────────────────────────
let rankingsHtml = '';
let rankingsSha  = '';
let CATS_DATA    = null;
let currentRankTab = 'pc';

async function loadRankings() {
  setMain(`<div class="loading"><div class="spinner"></div><span>Đang tải bảng xếp hạng...</span></div>`);
  try {
    const data = await ghGet('rankings.html');
    rankingsHtml = decodeURIComponent(escape(atob(data.content)));
    rankingsSha  = data.sha;
    // Extract CATS object
    const m = rankingsHtml.match(/const CATS\s*=\s*(\{[\s\S]*?\n\})\s*;/);
    if (!m) throw new Error('Không tìm thấy dữ liệu CATS trong rankings.html');
    CATS_DATA = new Function('return ' + m[1])();
    renderRankingsEditor();
  } catch(e) {
    setMain(`<div class="empty-state"><div class="empty-icon">⚠️</div><p>Lỗi: ${e.message}</p></div>`);
  }
}

function renderRankingsEditor() {
  const tabs = Object.keys(CATS_DATA).map(k => `
    <button class="rank-tab ${k===currentRankTab?'active':''}" onclick="switchRankTab('${k}')">
      ${CATS_DATA[k].icon} ${CATS_DATA[k].label}
    </button>`).join('');

  setMain(`
    <div class="page-header">
      <div class="page-title">Bảng xếp hạng <small>rankings.html</small></div>
      <div class="header-actions">
        <a class="btn btn-secondary btn-sm" href="https://otahub.asia/rankings.html" target="_blank">🔗 Xem live</a>
        <button class="btn btn-primary" id="rank-save-btn" onclick="saveRankings()">💾 Lưu & Deploy</button>
      </div>
    </div>
    <div class="content-area">
      <div style="background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:20px">
        <div class="rank-tabs" id="rank-tabs">${tabs}</div>
        <div id="rank-content"></div>
      </div>
    </div>
  `);
  renderRankTab(currentRankTab);
}

function switchRankTab(key) {
  currentRankTab = key;
  document.querySelectorAll('.rank-tab').forEach((t,i) => {
    t.classList.toggle('active', Object.keys(CATS_DATA)[i] === key);
  });
  renderRankTab(key);
}

function renderRankTab(key) {
  const cat = CATS_DATA[key];
  if (!cat) return;
  const el = document.getElementById('rank-content');
  if (!el) return;

  const topHtml = (cat.top||[]).map((e,i) => renderRankEntry(key,'top',i,e,true)).join('');
  const restHtml = (cat.rest||[]).map((e,i) => renderRankEntry(key,'rest',i,e,false)).join('');

  el.innerHTML = `
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px">
      💡 Chỉnh URL ảnh, tên, điểm số rồi nhấn <strong style="color:var(--cyan)">💾 Lưu & Deploy</strong>
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--cyan);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">🏆 Top 3</div>
    ${topHtml}
    ${restHtml ? `<div style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:16px 0 8px">Còn lại</div>${restHtml}` : ''}
  `;
}

function renderRankEntry(catKey, listKey, idx, e, isTop) {
  const numLabel = listKey==='top' ? ['🥇','🥈','🥉'][idx]||`#${idx+1}` : `#${idx+4}`;
  const numClass = listKey==='top' ? ['gold','silver','bronze'][idx]||'' : '';
  const imgId    = `ri_${catKey}_${listKey}_${idx}`;
  const titleId  = `rt_${catKey}_${listKey}_${idx}`;
  const studioId = `rs_${catKey}_${listKey}_${idx}`;
  const scoreId  = `rsc_${catKey}_${listKey}_${idx}`;
  const trendId  = `rtr_${catKey}_${listKey}_${idx}`;

  return `
    <div class="rank-entry${isTop?' top3':''}">
      <div style="text-align:center">
        <div class="rank-num ${numClass}">${numLabel}</div>
        <img class="rank-img-prev" id="prev_${imgId}" src="${esc(e.img||'')}"
          onerror="this.style.opacity=.3" alt="${esc(e.title||'')}"/>
      </div>
      <div class="rank-fields">
        <div>
          <div style="font-size:10px;color:var(--muted);margin-bottom:3px">URL ảnh</div>
          <input class="rank-input-sm" style="width:100%" id="${imgId}" value="${esc(e.img||'')}"
            oninput="document.getElementById('prev_${imgId}').src=this.value;updateRankData('${catKey}','${listKey}',${idx},'img',this.value)"/>
        </div>
        <div class="rank-row">
          <div>
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px">Tên</div>
            <input class="rank-input-sm" id="${titleId}" value="${esc(e.title||'')}"
              oninput="updateRankData('${catKey}','${listKey}',${idx},'title',this.value)"/>
          </div>
          <div>
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px">Điểm</div>
            <input class="rank-input-sm" id="${scoreId}" value="${esc(e.score||'')}"
              oninput="updateRankData('${catKey}','${listKey}',${idx},'score',this.value)"/>
          </div>
          <div>
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px">Trend</div>
            <input class="rank-input-sm" id="${trendId}" value="${esc(e.trend||'')}"
              oninput="updateRankData('${catKey}','${listKey}',${idx},'trend',this.value)"/>
          </div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--muted);margin-bottom:3px">Studio / Thể loại</div>
          <input class="rank-input-sm" style="width:100%" id="${studioId}"
            value="${esc(e.studio||e.sub||'')}"
            oninput="updateRankData('${catKey}','${listKey}',${idx},e.studio!==undefined?'studio':'sub',this.value)"/>
        </div>
      </div>
    </div>`;
}

function updateRankData(catKey, listKey, idx, field, value) {
  if (!CATS_DATA[catKey]) return;
  const list = CATS_DATA[catKey][listKey];
  if (!list || !list[idx]) return;
  list[idx][field] = value;
}

async function saveRankings() {
  const btn = document.getElementById('rank-save-btn');
  btn.textContent = '⏳ Đang lưu...'; btn.disabled = true;
  try {
    // Re-fetch to get latest SHA
    const latest = await ghGet('rankings.html');
    const sha = latest.sha;
    let html = decodeURIComponent(escape(atob(latest.content)));

    // Rebuild CATS entries via targeted replacements
    // Replace each entry's img and title in the CATS block
    for (const catKey of Object.keys(CATS_DATA)) {
      const cat = CATS_DATA[catKey];
      for (const listKey of ['top','rest']) {
        (cat[listKey]||[]).forEach((entry, idx) => {
          // Replace img URL
          if (entry._origImg && entry._origImg !== entry.img) {
            html = html.replace(
              new RegExp(entry._origImg.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'g'),
              entry.img
            );
          }
        });
      }
    }

    // Better: replace full CATS block with serialized version
    const newCats = 'const CATS = ' + serializeCats(CATS_DATA) + ';';
    html = html.replace(/const CATS\s*=\s*\{[\s\S]*?\n\}\s*;/, newCats);

    await ghPut('rankings.html', html, sha, '[admin] cap nhat bang xep hang');
    toast('success', '✅ Đã lưu bảng xếp hạng! Deploy trong ~1-2 phút.');
  } catch(e) {
    toast('error', 'Lỗi lưu: ' + e.message);
  } finally {
    btn.textContent = '💾 Lưu & Deploy'; btn.disabled = false;
  }
}

function serializeCats(cats) {
  // Custom serializer to keep JS object style
  function serEntry(e) {
    const parts = [];
    for (const [k,v] of Object.entries(e)) {
      if (v === null) parts.push(`${k}:null`);
      else if (typeof v === 'object') parts.push(`${k}:${JSON.stringify(v)}`);
      else if (typeof v === 'string') parts.push(`${k}:'${v.replace(/'/g,"\\'")}'`);
      else parts.push(`${k}:${v}`);
    }
    return '{' + parts.join(',') + '}';
  }
  function serList(arr) {
    return '[' + arr.map(serEntry).join(',\n      ') + ']';
  }
  const catParts = Object.entries(cats).map(([k,cat]) => {
    const entryParts = [];
    for (const [ck,cv] of Object.entries(cat)) {
      if (Array.isArray(cv)) entryParts.push(`${ck}:${serList(cv)}`);
      else if (typeof cv === 'string') entryParts.push(`${ck}:'${cv.replace(/'/g,"\\'")}'`);
      else entryParts.push(`${ck}:${JSON.stringify(cv)}`);
    }
    return `  ${k}:{\n    ${entryParts.join(',\n    ')}\n  }`;
  });
  return '{\n' + catParts.join(',\n') + '\n}';
}

function toast(type, msg) {
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.innerHTML = `<span class="toast-icon">${type==='success'?'✅':'❌'}</span><span>${msg}</span>`;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}
